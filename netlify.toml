[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "out"

# Removed cache plugin to fix webpack cache issues

# Removed vulnerable plugins - using Next.js built-in optimizations instead

# Lighthouse plugin removed due to complexity - use web.dev/measure instead

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--production=false"
  NEXT_TELEMETRY_DISABLED = "1"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "private, no-cache"

[[headers]]
  for = "/*.json"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "private, no-cache"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "private, no-cache"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[[edge_functions]]
  function = "security-headers"
  path = "/*"

[[edge_functions]]
  function = "rate-limit"
  path = "/api/*"

[[edge_functions]]
  function = "asset-guard"
  path = ["/assets/*", "/*.jpg", "/*.jpeg", "/*.png", "/*.mp4", "/*.json"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200